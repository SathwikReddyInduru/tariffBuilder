<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
 
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
 
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e4e7ec;
            --text-primary: #101828;
            --text-secondary: #667085;
            --approve-bg: #12b76a;
            --approve-hover: #039855;
            --reject-bg: #f04438;
            --reject-hover: #d92d20;
            --hierarchy-bg: #ffffff;
            --hierarchy-border: #d0d5dd;
            --hierarchy-text: #344054;
            --title-color: #6366f1;
            --shadow-sm: 0 1px 3px rgba(16,24,40,0.08), 0 1px 2px rgba(16,24,40,0.06);
            --shadow-md: 0 4px 8px rgba(16,24,40,0.08);
            --radius: 12px;
        }
 
        html, body {
            height: 100%;
        }
 
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 30px 40px;
        }
 
        .page-wrapper {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }
 
        .page-title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: var(--title-color);
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }
 
        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }
 
        .draft-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            height: 70vh;
            overflow-y: scroll;
            padding-right: 20px;
        }
 
        .draft-card {
            width: 100%;
            background: #fff;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
             
        }
 
        .draft-card:hover {
            box-shadow: var(--shadow-md);
        }
 
        .draft-name {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
            flex: 1;
        }
 
        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
 
        .btn {
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 20px;
            padding: 10px 22px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            transition: background 0.15s ease, transform 0.1s ease;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }
 
        .btn:active {
            transform: scale(0.97);
        }
 
        .btn-hierarchy {
            background: var(--hierarchy-bg);
            color: var(--hierarchy-text);
            border: 1px solid var(--hierarchy-border);
        }
 
        .btn-hierarchy:hover {
            background: #f9fafb;
        }
 
        .btn-approve {
            background: var(--approve-bg);
            color: #ffffff;
        }
 
        .btn-approve:hover {
            background: var(--approve-hover);
        }
 
        .btn-reject {
            background: var(--reject-bg);
            color: #ffffff;
            border-radius: 6px;
            padding: 15px 17px;
        }
 
        .btn-reject:hover {
            background: var(--reject-hover);
        }
      body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    padding: 30px 40px;
    overflow-y: scroll;
    /* ← REMOVE min-height: 100vh */
}
 
.draft-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-right: 20px;
    /* ← NO height, NO overflow-y here */
}
    </style>
</head>
<body>
 
<div class="page-wrapper">
 
    <h1 class="page-title">Admin Control Center</h1>
 
    <div class="section-label">
        <span>📥</span>
        <span><b>Pending Drafts</b></span>
    </div>
 
    <div class="draft-list">
 
        <!-- ✅ th:id added so JS can find and remove card -->
        <div class="draft-card"
             th:each="t : ${tariff}"
             th:id="'card-' + ${t.networkId}">
 
            <span class="draft-name" th:text="${t.tariffPackageName}">
                PACKAGE_NAME
            </span>
 
            <div class="actions">
 
                <a class="btn btn-hierarchy"
                   th:href="@{/admin/hierarchy/{id}(id=${t.networkId})}">
                   View Hierarchy
                </a>
 
                <!-- ✅ No <form> — onclick calls JS directly -->
                <button class="btn btn-approve"
                        th:onclick="'handleAction(' + ${t.networkId} + ', \'A\')'">
                    Approve
                </button>
 
                <button class="btn btn-reject"
                        th:onclick="'handleAction(' + ${t.networkId} + ', \'R\')'">
                    Reject
                </button>
 
            </div>
 
        </div>
 
    </div>
 
</div>
 
<!-- ✅ AJAX — no page reload, alert popup, card removed from UI, DB updated -->
<script>
function handleAction(networkId, status) {
    const message = status === 'A' ? 'Approved to Staging.' : 'Rejected';
 
    fetch('/admin/updateStatus', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ networkId: networkId, status: status })
    })
    .then(res => {
        if (res.ok) {
            alert(message);                                          // popup like your screenshot
            document.getElementById('card-' + networkId).remove();  // card disappears from UI
        } else {
            alert('Something went wrong!');
        }
    })
    .catch(() => alert('Server error!'));
}
</script>
 
</body>
</html>
