<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Xius Login</title>
 
    <!-- Google Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
 
    <style>
        * {
            box-sizing: border-box; /* FIXES OVERFLOW */
        }
 
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #5f76d6, #7b4bb7);
        }
 
        /* Header */
        .navbar {
            background: #f3f3f3;
            padding: 10px;
            margin-right: auto;
        }

        .navbar img {
            margin-left: 20px;
        }
 
        /* Card */
        .card {
            width: 360px;
            max-width: 90%;
            margin: 80px auto;
            padding: 25px;
            background: #f9f9f9;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
 
        .icon {
            font-size: 50px;
            color: #4aa3df;
        }
 
        .subtitle {
            font-size: 14px;
            margin: 10px 0 20px;
            color: #4a5d73;
        }
 
        /* Toggle */
        .toggle-container {
            margin-bottom: 15px;
        }
 
        .switch {
            position: relative;
            width: 45px;
            height: 22px;
            display: inline-block;
        }
 
        .switch input {
            display: none;
        }
 
        .slider {
            position: absolute;
            background: #ccc;
            border-radius: 20px;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
 
        .slider:before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 2px;
            top: 2px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
 
        input:checked + .slider {
            background: #2b8cc4;
        }
 
        input:checked + .slider:before {
            transform: translateX(22px);
        }
 
        /* Input Fields */
        .input-box {
            margin-bottom: 15px;
            text-align: left;
            width: 100%;
        }
 
        .input-box label {
            font-size: 13px;
            font-weight: bold;
        }
 
        .input-wrapper {
            position: relative;
            width: 100%;
        }
 
        .input-wrapper input {
            width: 100%;
            padding: 10px 35px 10px 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
 
        .input-wrapper .material-icons {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            pointer-events: none;
        }
 
        .error {
            color: red;
            font-size: 11px;
        }
 
        /* Buttons */
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }
 
        .btn {
            width: 48%;
            padding: 8px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
 
        .cancel {
            background: #ddd;
        }
 
        .submit {
            background: #2b8cc4;
            color: white;
        }
    </style>
</head>
 
<body>
 
<div class="navbar">
    <img src="https://www.xius.com/wp-content/themes/xius/assets/img/logo/logo.png" alt="Xius Logo" style="height:50px; vertical-align:middle;">
</div>
 
<div class="card">
 
    <span class="material-icons icon">lock</span>
 
    <div class="subtitle">
        Enter your credentials to access the system
    </div>
	<div th:if="${message}" style="color: green; margin-bottom: 10px;" th:text="${message}"></div>
 
    <!-- Toggle -->
    <div class="toggle-container">
        <span id="roleText">User</span>
        <label class="switch">
            <input type="checkbox" id="roleToggle" onchange="setRole()">
            <span class="slider"></span>
        </label>
    </div>
 
    <!-- FORM -->
    <form th:action="@{/login}" th:object="${loginForm}" method="post" autocomplete="off">
 
        <!-- Hidden Role -->
        <input type="hidden" th:field="*{role}" id="roleField" value="USER"/>
 
        <!-- Network Name -->
        <div class="input-box" id="networkField">
            <label>Network Name *</label>
            <div class="input-wrapper">
                <input type="text" th:field="*{networkName}" placeholder="Enter network name"  autocomplete="off">
                <span class="material-icons">dns</span>
            </div>
            <div class="error" th:errors="*{networkName}"></div>
        </div>
 
        <!-- Username -->
        <div class="input-box">
            <label>Username *</label>
            <div class="input-wrapper">
                <input type="text" th:field="*{username}" placeholder="Enter your username" autocomplete="new-username">
                <span class="material-icons">person</span>
            </div>
            <div class="error" th:errors="*{username}"></div>
        </div>
 
        <!-- Password -->
        <div class="input-box">
            <label>Password *</label>
            <div class="input-wrapper">
                <input type="password" th:field="*{password}" placeholder="Enter your password"   autocomplete="new-username">
                <span class="material-icons">lock</span>
            </div>
            <div class="error" th:errors="*{password}"></div>
        </div>
 
        <!-- Buttons -->
        <div class="buttons">
            <button type="reset" class="btn cancel">Cancel</button>
            <button type="submit" class="btn submit">Submit</button>
        </div>
 
    </form>
 
</div>
 
<script>
    function setRole() {
        let toggle = document.getElementById("roleToggle");
        let roleField = document.getElementById("roleField");
        let roleText = document.getElementById("roleText");
        let networkField = document.getElementById("networkField");
 
        if (toggle.checked) {
            roleField.value = "ADMIN";
            roleText.innerText = "Admin";
            networkField.style.display = "none";
        } else {
            roleField.value = "USER";
            roleText.innerText = "User";
            networkField.style.display = "block";
        }
    }
</script>
 
</body>
</html>
